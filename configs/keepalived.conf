# Keepalived Configuration
# Archivo de referencia - El real se genera vía Ansible

global_defs {
    router_id proxy1
    script_user root
    enable_script_security
}

vrrp_script check_haproxy {
    script "/etc/keepalived/scripts/check_haproxy.sh"
    interval 2
    weight -20
    fall 3
    rise 2
}

vrrp_instance VI_1 {
    state MASTER
    interface ens3
    virtual_router_id 51
    priority 101

    advert_int 1

    authentication {
        auth_type PASS
        auth_pass k33p@liv3d
    }

    virtual_ipaddress {
        192.168.122.10/24 dev ens3
    }

    track_script {
        check_haproxy
    }
}
