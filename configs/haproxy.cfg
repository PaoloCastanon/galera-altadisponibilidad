# HAProxy Configuration for MariaDB Galera Cluster
# Archivo de referencia - El real se genera vía Ansible

global
    log /dev/log    local0
    log /dev/log    local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms

# Stats Page
listen stats
    bind *:8080
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:admin123
    stats admin if TRUE

# MariaDB Galera Cluster
listen mysql_galera
    bind *:3306
    mode tcp
    option tcpka
    option mysql-check user haproxy_check
    balance roundrobin
    default-server inter 3s fall 3 rise 2
    server db1 192.168.122.21:3306 check weight 1
    server db2 192.168.122.22:3306 check weight 1
    server db3 192.168.122.23:3306 check weight 1
