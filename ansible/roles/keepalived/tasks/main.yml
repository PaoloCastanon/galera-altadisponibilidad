---
# Role keepalived - VIP con VRRP para alta disponibilidad (Debian Linux)

- name: Instalar Keepalived
  apt:
    name: keepalived
    state: present
    update_cache: yes

- name: Habilitar IP forwarding
  lineinfile:
    path: /etc/sysctl.conf
    line: "net.ipv4.ip_forward=1"
    create: yes
  notify: apply sysctl

- name: Habilitar bind a IPs no locales
  lineinfile:
    path: /etc/sysctl.conf
    line: "net.ipv4.ip_nonlocal_bind=1"
  notify: apply sysctl

- name: Aplicar sysctl inmediatamente
  command: sysctl -p
  changed_when: false
  failed_when: false

- name: Crear directorio de scripts
  file:
    path: /etc/keepalived/scripts
    state: directory
    mode: "0755"

- name: Crear script de health check para HAProxy
  template:
    src: check_haproxy.sh.j2
    dest: /etc/keepalived/scripts/check_haproxy.sh
    mode: "0755"

- name: Crear script de notificación
  template:
    src: notify.sh.j2
    dest: /etc/keepalived/scripts/notify.sh
    mode: "0755"

- name: Configurar Keepalived
  template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart keepalived

- name: Arrancar Keepalived
  service:
    name: keepalived
    state: started
    enabled: true

- name: Esperar a que Keepalived esté listo
  pause:
    seconds: 5

- name: Verificar estado de VRRP
  command: ip addr show {{ vip_interface }}
  register: vrrp_status
  changed_when: false

- name: Mostrar estado de la VIP
  debug:
    msg: "{{ vrrp_status.stdout }}"
